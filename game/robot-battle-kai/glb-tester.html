<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>GLB Tester</title>
    <link rel="icon" href="data:," />
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/build/three.module.js",
          "three/addons/": "./vendor/three/examples/jsm/"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(255, 232, 196, 0.2), transparent 42%),
          linear-gradient(180deg, #1d1713 0%, #100d0b 100%);
        color: #f6ecdf;
        font-family: "Segoe UI", sans-serif;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .tester-panel {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 10;
        width: min(360px, calc(100vw - 36px));
        padding: 16px 18px;
        border: 1px solid rgba(255, 239, 214, 0.14);
        border-radius: 18px;
        background: rgba(19, 14, 11, 0.8);
        backdrop-filter: blur(12px);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      }

      .tester-panel h1 {
        margin: 0 0 6px;
        font-size: 20px;
      }

      .tester-panel p {
        margin: 0 0 12px;
        font-size: 13px;
        color: rgba(246, 236, 223, 0.78);
      }

      .tester-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .tester-actions button {
        border: 0;
        border-radius: 999px;
        padding: 9px 14px;
        background: rgba(255, 197, 122, 0.2);
        color: #fff2e4;
        font: inherit;
        cursor: pointer;
      }

      .tester-actions button[data-active="true"] {
        background: linear-gradient(135deg, #ff9d5c, #ffe1a4);
        color: #25170e;
        font-weight: 700;
      }

      .tester-readout {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 6px 12px;
        font-size: 13px;
      }

      .tester-readout dt {
        color: rgba(255, 216, 163, 0.92);
      }

      .tester-readout dd {
        margin: 0;
        font-family: Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <section class="tester-panel">
      <h1>GLB Locomotion Tester</h1>
      <p>`Walking animation` を再生しつつ、脚ボーン差分の増幅結果を walk / run で確認します。</p>
      <div class="tester-actions">
        <button type="button" data-mode="walk" data-active="true">Walk</button>
        <button type="button" data-mode="run">Run</button>
        <button type="button" data-action="skeleton">Skeleton</button>
      </div>
      <dl class="tester-readout">
        <dt>Clip</dt>
        <dd data-field="clip">loading</dd>
        <dt>Mode</dt>
        <dd data-field="mode">walk</dd>
        <dt>Left Leg</dt>
        <dd data-field="left-angle">0.0 deg</dd>
        <dt>Right Leg</dt>
        <dd data-field="right-angle">0.0 deg</dd>
        <dt>Amplifiers</dt>
        <dd data-field="amplifier-count">0</dd>
        <dt>Skeleton</dt>
        <dd data-field="skeleton-state">off</dd>
      </dl>
    </section>
    <canvas id="glb-tester-canvas" aria-label="GLB tester canvas"></canvas>
    <script type="module" src="./src/glb-tester.js"></script>
  </body>
</html>
