<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Game Hub</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-a: #0f1418;
        --bg-b: #22160f;
        --panel: rgba(18, 22, 28, 0.82);
        --line: rgba(255, 226, 184, 0.14);
        --text: #f4ead9;
        --muted: #b4aa96;
        --accent: #ffb15a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(255, 181, 90, 0.18), transparent 42%),
          linear-gradient(160deg, var(--bg-a), var(--bg-b));
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(760px, 100%);
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        padding: 32px;
        backdrop-filter: blur(14px);
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3.4rem);
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }
      .grid {
        display: grid;
        gap: 16px;
        margin-top: 28px;
      }
      a.card {
        display: block;
        text-decoration: none;
        color: inherit;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 20px 22px;
        background: rgba(255, 255, 255, 0.03);
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }
      a.card:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 177, 90, 0.5);
        background: rgba(255, 177, 90, 0.06);
      }
      .eyebrow {
        display: inline-block;
        margin-bottom: 8px;
        color: var(--accent);
        font-size: 0.78rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .title {
        font-size: 1.2rem;
        font-weight: 700;
      }
      .desc {
        margin-top: 6px;
      }
      .card.is-disabled {
        cursor: default;
        opacity: 0.86;
      }
      .card.is-disabled:hover {
        transform: none;
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.03);
      }
    </style>
  </head>
  <body>
    <main>
      <span class="eyebrow">Codex Games</span>
      <h1>Game Hub</h1>
      <p>Multiple browser-game projects live under this repository. Start from a game folder below.</p>
      <div class="grid">
        <a class="card" href="./robot-battle-kai/">
          <div class="title">robot-battle-kai</div>
          <p class="desc">3D robot air-combat boss battle vertical slice.</p>
        </a>
        <div class="card is-disabled" aria-disabled="true">
          <div class="title">skydive</div>
          <p class="desc">Currently being rebuilt from scratch as a new city skydive project.</p>
        </div>
      </div>
    </main>
  </body>
</html>
